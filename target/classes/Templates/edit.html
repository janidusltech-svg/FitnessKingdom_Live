<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Member - Fitness Kingdom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; color: white; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/images/gym-background.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; letter-spacing: 1px;}
        .highlight { color: #0dcaf0; }
        .glass-card { background: rgba(0, 0, 0, 0.7); border: 1px solid #0dcaf0; border-radius: 15px; padding: 40px; margin-top: 50px; }
        .form-control, .form-select { background-color: rgba(255,255,255,0.1); color: white; border: 1px solid gray; }
        .form-control:focus, .form-select:focus { background-color: rgba(255,255,255,0.2); color: white; border-color: #0dcaf0; box-shadow: none; }
        .form-select option { background-color: #1a1a1a; color: white; }
    </style>
</head>
<body>
<nav class="navbar container mt-3">
    <a class="navbar-brand text-decoration-none fs-2 fw-bold text-white" href="/">FITNESS <span class="highlight">KINGDOM</span></a>
    <a href="/members" class="btn btn-outline-light rounded-pill px-4 text-uppercase">Cancel / Back</a>
</nav>

<div class="container d-flex justify-content-center pb-5">
    <div class="glass-card col-md-6 shadow-lg">
        <h2 class="text-center mb-4 fw-bold text-uppercase">EDIT PROFILE: <span class="text-warning" th:text="${member.id}"></span></h2>

        <div th:if="${errorMsg}" class="alert alert-danger font-sans-serif fw-bold text-center" th:text="${errorMsg}"></div>

        <form action="/updateMember" method="POST">
            <input type="hidden" name="id" th:value="${member.id}">
            <input type="hidden" name="status" th:value="${member.status}">
            <input type="hidden" name="registeredDate" th:value="${member.registeredDate}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase text-info">Full Name</label>
                    <input type="text" class="form-control" name="name" th:value="${member.name}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase text-info">Phone Number</label>
                    <input type="text" class="form-control" name="phone" th:value="${member.phone}" maxlength="10" pattern="07[0-9]{8}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase text-info">Email Address</label>
                    <input type="email" class="form-control" name="email" th:value="${member.email}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase text-info">Age</label>
                    <input type="number" class="form-control" name="age" th:value="${member.age}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-uppercase text-info">NIC Number</label>
                <input type="text" class="form-control" name="nic" th:value="${member.nic}" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase text-warning">Update Plan</label>
                    <select class="form-select" name="membershipPlan" required>
                        <option value="Basic" th:selected="${member.membershipPlan == 'Basic'}">Basic</option>
                        <option value="Standard" th:selected="${member.membershipPlan == 'Standard'}">Standard</option>
                        <option value="VIP" th:selected="${member.membershipPlan == 'VIP'}">VIP Legacy</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase text-warning">Update Duration</label>
                    <select class="form-select" name="duration" required>
                        <option value="1" th:selected="${member.duration == '1'}">1 Month</option>
                        <option value="3" th:selected="${member.duration == '3'}">3 Months</option>
                        <option value="6" th:selected="${member.duration == '6'}">6 Months</option>
                        <option value="12" th:selected="${member.duration == '12'}">1 Year</option>
                    </select>
                </div>
            </div>

            <hr class="text-secondary mt-4 mb-4">

            <div class="alert alert-dark border-danger p-3" style="background: rgba(0,0,0,0.5);">
                <label class="form-label text-uppercase text-danger fw-bold mb-1">Admin Authorization Required</label>
                <input type="password" class="form-control border-danger" name="adminPassword" placeholder="Enter Admin Password to Save" required>
            </div>

            <button type="submit" class="btn btn-info fw-bold w-100 fs-5 text-uppercase">Update Member Details</button>
        </form>
    </div>
</div>
</body>
</html>
