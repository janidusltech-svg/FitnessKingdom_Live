<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Fitness Kingdom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; color: white; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/images/gym-background.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; letter-spacing: 1px;}
        .navbar-brand { font-size: 32px; font-weight: 700; color: white !important; letter-spacing: 2px; }
        .highlight { color: #FD7A3F; }
        .glass-card { background: rgba(0, 0, 0, 0.7); border: 1px solid #FD7A3F; border-radius: 15px; padding: 40px; margin-top: 50px; }
        /* NEW: Make placeholders visible but subtle */
        .form-control::placeholder { color: rgba(255, 255, 255, 0.6); opacity: 1; }
        .form-control:focus, .form-select:focus { background-color: rgba(255,255,255,0.2); color: white; border-color: #FD7A3F; box-shadow: none; }
        .form-select option { background-color: #1a1a1a; color: white; }
        .btn-register { background-color: #FD7A3F; color: white; font-weight: bold; width: 100%; border-radius: 50px; padding: 12px; border: none; font-size: 20px; text-transform: uppercase; margin-top: 20px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .btn-register:hover { background-color: white; color: #FD7A3F; transform: scale(1.05); box-shadow: 0 10px 20px rgba(253, 122, 63, 0.5); }

        /* Custom Validation Colors */
        .invalid-feedback { font-size: 14px; font-weight: bold; color: #ff4d4d; }
    </style>
</head>
<body>
<nav class="navbar container mt-3">
    <a class="navbar-brand text-decoration-none" href="/">FITNESS <span class="highlight">KINGDOM</span></a>
    <a href="/" class="btn btn-outline-light rounded-pill px-4 text-uppercase">Back Home</a>
</nav>

<div class="container d-flex justify-content-center pb-5">
    <div class="glass-card col-md-6 shadow-lg">
        <h2 class="text-center mb-4 fw-bold text-uppercase">JOIN THE <span class="highlight">CLUB</span></h2>

        <form action="/saveMember" method="POST" class="needs-validation" novalidate>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Anura Kumara" required>
                    <div class="invalid-feedback">Full name is required!</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Phone Number</label>
                    <input type="text" class="form-control" name="phone" placeholder="07XXXXXXXX"
                           maxlength="10"
                           pattern="07[0-9]{8}"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                    <div class="invalid-feedback">Must be a valid 10-digit number starting with 07!</div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="akdissanayake@example.com" required>
                    <div class="invalid-feedback">A valid email is required!</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Age</label>
                    <input type="number" class="form-control" name="age" placeholder="25" min="16" max="100" required>
                    <div class="invalid-feedback">Please enter a valid age (16+)!</div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-uppercase">NIC Number</label>
                <input type="text" class="form-control" name="nic" placeholder="2001XXXXXXXX" required>
                <div class="invalid-feedback">NIC number is required!</div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Step 1: Choose Plan</label>
                    <select class="form-select" name="membershipPlan" id="planSelect" onchange="calculatePrice()" required>
                        <option value="" style="color: gray;" selected disabled>-- Select Plan --</option>
                        <option value="Basic">Basic (Rs. 3000/mo)</option>
                        <option value="Standard">Standard (Rs. 5000/mo)</option>
                        <option value="VIP">VIP Legacy (Rs. 8000/mo)</option>
                    </select>
                    <div class="invalid-feedback">Please select a plan!</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-uppercase">Step 2: Duration</label>
                    <select class="form-select" name="duration" id="durationSelect" onchange="calculatePrice()" required>
                        <option value="" style="color: gray;" selected disabled>-- Select Duration --</option>
                        <option value="1">1 Month</option>
                        <option value="3">3 Months</option>
                        <option value="6">6 Months</option>
                        <option value="12">1 Year (12 Months)</option>
                    </select>
                    <div class="invalid-feedback">Please select a duration!</div>
                </div>
            </div>

            <div class="alert alert-dark border-warning text-center mt-2 mb-2 p-2" style="background: rgba(0,0,0,0.5);">
                <h5 class="mb-0 text-warning fw-bold text-uppercase" id="displayTotal">Total Price: Rs. 0</h5>
            </div>

            <button type="submit" class="btn btn-register">SAVE MEMBER</button>
        </form>
    </div>
</div>

<script>
    // 1. Price Calculator
    function calculatePrice() {
        let plan = document.getElementById("planSelect").value;
        let duration = document.getElementById("durationSelect").value;

        // Only calculate if BOTH plan and duration are selected
        if(plan && duration) {
            let monthly = 0;
            if (plan === "Basic") monthly = 3000;
            if (plan === "Standard") monthly = 5000;
            if (plan === "VIP") monthly = 8000;

            let total = monthly * parseInt(duration);
            document.getElementById("displayTotal").innerText = "Total Price: Rs. " + total;
        }
    }

    // 2. Strict Form Validation Blocker
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')

        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
</body>
</html>
