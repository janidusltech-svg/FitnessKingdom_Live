<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome - Fitness Kingdom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; color: white; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('/images/gym-background.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; letter-spacing: 1px;}
        .highlight { color: #FD7A3F; }
        .glass-card { background: rgba(0, 0, 0, 0.7); border: 2px solid #5cb85c; border-radius: 15px; padding: 50px; text-align: center;}
        .id-badge { background-color: #FD7A3F; color: white; font-size: 48px; font-weight: bold; padding: 10px 40px; border-radius: 10px; display: inline-block; margin: 20px 0; letter-spacing: 3px; box-shadow: 0 10px 20px rgba(253, 122, 63, 0.3);}
        .btn-home { background-color: white; color: black; font-weight: bold; border-radius: 50px; padding: 12px 40px; text-transform: uppercase; text-decoration: none; display: inline-block; margin-top: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .btn-home:hover { transform: scale(1.1); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="glass-card col-md-8 shadow-lg">
        <h1 class="mb-3 fw-bold text-uppercase" style="color: #5cb85c;">Registration Successful!</h1>

        <p class="fs-4 font-sans-serif mb-1">You successfully joined the Fitness Kingdom club.</p>
        <p class="text-uppercase fw-bold mt-3 mb-1">Your Membership ID is:</p>
        <div class="id-badge" th:text="${memberId}"></div>

        <div class="alert alert-dark border-warning mt-3 font-sans-serif" style="background: rgba(0,0,0,0.5);">
            <p class="mb-1 text-light">Your Total Plan Price: <strong class="text-warning" th:text="${'Rs. ' + totalPrice}"></strong></p>
            <p class="mb-0 text-danger fw-bold">⚠️ You must pay at least 1 month's fee (<span th:text="${'Rs. ' + monthlyPrice}"></span>) at the front desk before join with our Kingdom !</p>
        </div>

        <a href="/" class="btn btn-home">Return to Home</a>
    </div>
</div>
</body>
</html>
